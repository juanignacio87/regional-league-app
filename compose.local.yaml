services:
  postgres:
    image: postgres:16-alpine
    container_name: regional-league-app-postgres
    environment:
      POSTGRES_DB: regional_league_app
      POSTGRES_USER: regional_league_app
      POSTGRES_PASSWORD: regional_league_app_dev
    ports:
      - "5432:5432"
    volumes:
      - regional-league-app-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U regional_league_app -d regional_league_app"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  regional-league-app-postgres:
