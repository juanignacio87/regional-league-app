services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: regional-football-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=regional_football;Username=regional;Password=regional_dev_password
    ports:
      - "8080:8080"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: regional-football-db
    environment:
      POSTGRES_DB: regional_football
      POSTGRES_USER: regional
      POSTGRES_PASSWORD: regional_dev_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U regional -d regional_football"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:
